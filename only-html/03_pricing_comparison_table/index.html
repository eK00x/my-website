<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Acme Plans</title>
    </head>
    
    <body>
        <!-- Header Section -->
        <header>
            <h1>Acme Plans</h1>

            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <!-- Main Section -->
        <main>
            <table>
                <caption>Plan comparison</caption>
                    <thead>
                        <tr>
                            <th scope="col">Plan</th>
                            <th scope="col">Storage</th>
                            <th scope="col">Projects</th>
                            <th scope="col">Support</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th scope="row">Free</th>
                            <td>5 GB</td>
                            <td>3</td>
                            <td>Email</td>
                        </tr>
                        <tr>
                            <th scope="row">Pro</th>
                            <td>100 GB</td>
                            <td>25</td>
                            <td>Priority Email</td>
                        </tr>
                        <tr>
                            <th scope="row">Business</th>
                            <td>1 TB</td>
                            <td>Unlimited</td>
                            <td>24/7 Phone</td>                    
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="4">All plans include SSL and daily backups</td>
                        </tr>
                    </tfoot>
            </table>
        </main>

        <footer>
            <p>&copy; 2025 My Site</p>
        </footer>
    </body>
</html>
